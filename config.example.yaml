# Context Keeper configuration
# Copy to ~/.config/context-keeper/config.yaml and edit.
#
# The "files" list can be any filenames your AI agents use. Common ones:
#   AGENTS.md        -> Kimi Code
#   CLAUDE.md        -> Claude Code
#   .cursorrules     -> Cursor
#   CONVENTIONS.md   -> Aider / generic
#   CONTEXT.md       -> your own project brief
#
# The "local" path should be the actual project root on THIS device.
# It can differ per device — e.g. ~/Projects/barnos on Linux and
# C:\Users\Rob\barnos on Windows. Markless is the shared source of truth.

markless:
  url: https://your-markless-instance.example.com
  username: your-username
  password: "your-password"  # or set MARKLESS_PASSWORD env var

projects:
  barnos:
    local: ~/Projects/barnos
    remote:
      book: Context
      section: barnos
    files:
      - AGENTS.md
      - CLAUDE.md
      - CONTEXT.md

  os-agent:
    local: ~/Projects/os-agent
    remote:
      book: Context
      section: os-agent
    files:
      - AGENTS.md
      - CLAUDE.md

  rumbo-web:
    local: ~/Projects/rumbo-web
    remote:
      book: Context
      section: rumbo-web
    files:
      - AGENTS.md
      - CLAUDE.md

# Optional: override backup/state directories
# backup_dir: ~/.local/share/context-keeper/backups
# state_dir: ~/.local/share/context-keeper/state
